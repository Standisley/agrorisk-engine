version: '3.8'

services:
  oracle-xe:
    image: gvenzl/oracle-xe:latest
    container_name: agrorisk-oracle
    ports:
      - "1521:1521"
    environment:
      - ORACLE_PASSWORD=${DB_PASS:-SuaSenhaForte2026!}
      - APP_USER=agrorisk_admin
      - APP_USER_PASSWORD=${DB_PASS:-SuaSenhaForte2026!}
    volumes:
      - oracle_data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  oracle_data:
